<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}xxybacktest 量化系统{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f7fa; color: #333;
        }
        body.dark { background: #0f1218; color: #e6ebf2; }

        /* ── 统一导航头 ── */
        .nav-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white; padding: 14px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 100;
        }
        .nav-header .sys-title {
            font-size: 18px; font-weight: 600; letter-spacing: 1px;
            white-space: nowrap;
        }
        .nav-header .sys-title .ver {
            font-size: 10px; color: rgba(255,255,255,0.4); margin-left: 4px;
        }
        .nav-header nav { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
        .nav-header nav a {
            color: rgba(255,255,255,0.75); text-decoration: none;
            padding: 6px 12px; border-radius: 6px; font-size: 13px;
            transition: all 0.2s; white-space: nowrap;
        }
        .nav-header nav a:hover { color: #fff; background: rgba(255,255,255,0.12); }
        .nav-header nav a.here { color: #fff; background: rgba(255,255,255,0.18); font-weight: 600; }

        /* ── 内容容器 ── */
        .content-wrap { max-width: 1520px; margin: 0 auto; padding: 16px 24px; }

        /* ── 暗色主题下的内容样式 ── */
        body.dark .card { background: #171c26; border: 1px solid #2a3240; border-radius: 8px; overflow: hidden; }
        body.dark .card-hd { display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; border-bottom: 1px solid #2a3240; }
        body.dark .card-hd h3 { font-size: 12px; font-weight: 500; }
        body.dark .ch-tag { font-size: 10px; color: #8a94a6; }
        body.dark .card-bd { flex: 1; min-height: 0; overflow: hidden; }
        body.dark .card-bd.pad { padding: 10px 14px; }
        body.dark .card-bd.scrl { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2a3240 transparent; padding: 8px 14px; }
        body.dark .card-bd.scrl::-webkit-scrollbar { width: 4px; }
        body.dark .card-bd.scrl::-webkit-scrollbar-thumb { background: #2a3240; border-radius: 2px; }

        body.dark .loading { text-align: center; color: #8a94a6; padding: 30px; font-size: 12px; }
        body.dark .loading::before { content: ""; display: inline-block; width: 12px; height: 12px;
            border: 2px solid #2a3240; border-top-color: #4c8dff; border-radius: 50%;
            animation: spin .8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        body.dark .err { text-align: center; color: #8a94a6; padding: 20px; font-size: 11px; }
        body.dark .up { color: #ff5d5d; } body.dark .down { color: #26c281; }

        body.dark .btn { background: #4c8dff; color: #fff; border: none; border-radius: 6px;
            padding: 6px 14px; cursor: pointer; font-size: 12px; }
        body.dark .btn:hover { opacity: .9; }
        body.dark input.stock-code { background: #1e2531; border: 1px solid #2a3240; color: #e6ebf2;
            border-radius: 5px; padding: 5px 10px; font-size: 12px; width: 90px; outline: none; }
        body.dark input.stock-code:focus { border-color: #4c8dff; }
        body.dark .tick { color: #8a94a6; font-size: 11px; }

        body.dark .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        body.dark .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        body.dark .mt12 { margin-top: 12px; }

        @media(max-width:1000px) { body.dark .grid2, body.dark .grid3 { grid-template-columns: 1fr; } }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">

    <!-- ═══════════════ 统一导航头 ═══════════════ -->
    <div class="nav-header">
        <span class="sys-title">📊 xxybacktest<span class="ver">v0.1</span></span>
        <nav>
            {% set here = request.path %}
            <a href="/"        class="{% if here == '/' %}here{% endif %}">🏠 首页</a>
            <a href="/market"  class="{% if here == '/market' %}here{% endif %}">📡 行情</a>
            <a href="/research" class="{% if here == '/research' %}here{% endif %}">📋 研报</a>
            <a href="/signals" class="{% if here == '/signals' %}here{% endif %}">⚡ 信号</a>
            <a href="/capital" class="{% if here == '/capital' %}here{% endif %}">💰 资金</a>
            <a href="/fundamentals" class="{% if here == '/fundamentals' %}here{% endif %}">📊 基础</a>
            <a href="/announcements" class="{% if here == '/announcements' %}here{% endif %}">📢 公告</a>
            <a href="/factors" class="{% if here == '/factors' %}here{% endif %}">📈 因子</a>
            <a href="/user" class="{% if here == '/user' %}here{% endif %}">👤 用户</a>
            <a href="/tasks" class="{% if here == '/tasks' %}here{% endif %}">⏱ 任务</a>
        </nav>
    </div>

    <!-- ═══════════════ 内容区 ═══════════════ -->
    {% block content_wrap %}
    <div class="content-wrap">
        {% block content %}{% endblock %}
    </div>
    {% endblock %}

    {% block extra_js %}{% endblock %}

    <!-- ═══════════════ 跨页面股票代码保持 ═══════════════ -->
    <script>
    (function(){
        // 从 URL 参数或 sessionStorage 恢复股票代码
        var p = new URLSearchParams(window.location.search);
        var code = p.get('code');
        if (code && code.match(/^\d{6}/)) {
            sessionStorage.setItem('lastCode', code);
        }
        // 给导航链接加上 ?code= 参数以保持上下文
        var last = sessionStorage.getItem('lastCode');
        if (last && last.match(/^\d{6}/) && !code) {
            var links = document.querySelectorAll('.nav-header nav a');
            links.forEach(function(a) {
                if (a.pathname !== '/' && a.pathname !== '/tasks' && a.pathname !== '/factors' && a.pathname !== '/user') {
                    if (!a.href.includes('?code=')) {
                        a.href = a.pathname + '?code=' + last;
                    }
                }
            });
        }
    })();
    </script>
</body>
</html>
