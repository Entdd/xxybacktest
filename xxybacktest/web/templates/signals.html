<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>信号监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{--bg:#0f1218;--panel:#171c26;--panel2:#1e2531;--line:#2a3240;--text:#e6ebf2;--sub:#8a94a6;--accent:#4c8dff;--green:#26c281;--red:#ff5d5d;--gold:#f5d547}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px}
  .wrap{max-width:1520px;margin:0 auto;padding:16px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
  h1{font-size:19px;font-weight:600}h1 .dot{color:var(--accent)}
  .hr{display:flex;align-items:center;gap:8px}.btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px}.btn:hover{opacity:.9}
  .navlink{color:var(--sub);font-size:11px;text-decoration:none;margin-left:4px}.navlink:hover{color:var(--accent)}
  .ut{color:var(--sub);font-size:11px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mt12{margin-top:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .ch{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
  .ch h3{font-size:12px;font-weight:500}.ch .tag{font-size:10px;color:var(--sub)}
  .cb{flex:1}.cb.pad{padding:10px 14px}.cb.scrl{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent;padding:8px 14px}
  .cb.scrl::-webkit-scrollbar{width:4px}.cb.scrl::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
  .up{color:var(--red)}.down{color:var(--green)}
  .loading{text-align:center;color:var(--sub);padding:30px;font-size:12px}
  .loading::before{content:"";display:inline-block;width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{text-align:center;color:var(--sub);padding:20px;font-size:11px}

  .hs-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);font-size:11px;gap:8px}.hs-row:last-child{border-bottom:none}
  .hs-n{font-weight:600;min-width:60px}.hs-c{color:var(--sub);font-size:10px;min-width:50px}
  .hs-r{color:var(--accent);flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hs-p{font-weight:500;min-width:50px;text-align:right}.hs-t{color:var(--sub);font-size:10px;min-width:40px;text-align:right}

  .nb-summary{display:flex;justify-content:space-around;padding:10px 14px;font-size:12px;background:var(--panel2);border-radius:6px;margin:8px 14px}
  .nb-summary b{font-size:16px}.nb-chart-wrap{width:100%;height:440px}

  .dt-row{padding:6px 0;border-bottom:1px solid var(--line);font-size:11px;line-height:1.4}.dt-row:last-child{border-bottom:none}
  .dt-n{font-weight:600}.dt-c{color:var(--sub);font-size:10px}.dt-reason{color:var(--sub);font-size:10px}

  .ctag{background:var(--panel2);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--accent);display:inline-block;margin:2px}
  .lk-item{padding:5px 0;border-bottom:1px solid var(--line);font-size:11px}.lk-date{color:var(--red);font-weight:500}.lk-type{color:var(--sub);font-size:10px}.lk-detail{color:var(--sub);font-size:10px}

  .sent-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
  .sent-i{text-align:center;background:var(--panel2);border-radius:6px;padding:10px}.sent-v{font-size:20px;font-weight:700}.sent-l{font-size:10px;color:var(--sub)}

  @media(max-width:1000px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>市场信号监控 <span class="dot">●</span></h1>
  <div class="hr">
    <span class="ut" id="tick">加载中...</span>
    <button class="btn" onclick="refreshAll()">刷新全部</button>
    <input id="dtDate" style="background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:5px;padding:5px 10px;font-size:12px;width:110px" placeholder="龙虎榜日期"></input>
    <a class="navlink" href="/">🏠</a><a class="navlink" href="/live">实时</a><a class="navlink" href="/signals" style="color:var(--gold)">信号</a><a class="navlink" href="/capital">筹码</a><a class="navlink" href="/fundamentals">基本面</a><a class="navlink" href="/factors">因子</a>
  </div>
</header>

<!-- 热点 + 北向 -->
<div class="grid2">
  <div class="card"><div class="ch"><h3>今日强势股 · 题材归因</h3><span class="tag" id="hsTag"></span></div><div class="cb scrl" id="hsBox" style="max-height:560px"><div class="loading">加载中</div></div></div>
  <div class="card"><div class="ch"><h3>北向资金</h3><span class="tag" id="nbTag"></span></div><div class="cb" id="nbBox"><div class="loading">加载中</div></div></div>
</div>

<!-- 龙虎榜 + 解禁&概念 -->
<div class="grid2 mt12">
  <div class="card"><div class="ch"><h3>全市场龙虎榜</h3><span class="tag" id="dtTag"></span></div><div class="cb scrl" id="dtBox" style="max-height:500px"><div class="loading">加载中</div></div></div>
  <div class="card"><div class="ch"><h3>解禁日历 & 概念板块</h3></div><div class="cb scrl" id="lcBox" style="max-height:500px"><div class="loading">加载中</div></div></div>
</div>

<!-- 打板 -->
<div class="card mt12"><div class="ch"><h3>今日打板</h3></div><div class="cb pad" id="luBox"><div class="loading">加载中</div></div></div>
</div>

<script>
const $=s=>document.getElementById(s);
function up(v){return v>=0?'up':'down'}function sg(v){return v>=0?'+':''}
async function fj(u){const r=await fetch(u);return r.json()}

// ═══════════════════ 热点 ═══════════════════
async function loadHS(){
  const b=$('hsBox');
  try{
    const j=await fj('/api/live/hot_stocks');
    if(j.error||!j.data?.length){b.innerHTML='<div class="err">暂无强势股数据<br><span style="font-size:10px">(同花顺 zx.10jqka.com.cn 交易时段可用)</span></div>';return}
    $('hsTag').textContent=j.data.length+'只强势股';
    b.innerHTML=j.data.map(r=>
      '<div class="hs-row"><span class="hs-n">'+r.name+'</span><span class="hs-c"><a href="/live?code='+r.code+'" title="实时" style="color:var(--accent);text-decoration:none">'+r.code+'</a> <a href="/fundamentals?code='+r.code+'" title="基本面" style="color:var(--sub);text-decoration:none;font-size:9px">📋</a></span><span class="hs-r" title="'+(r.reason||'')+'">'+(r.reason||'')+'</span><span class="hs-p '+up(r.change_pct)+'">'+sg(r.change_pct)+(r.change_pct||0).toFixed(1)+'%</span><span class="hs-t">换'+(r.turnover||0).toFixed(1)+'%</span></div>'
    ).join('');
  }catch(e){b.innerHTML='<div class="err">请求失败</div>'}
}

// ═══════════════════ 北向 ═══════════════════
let nbC=null;
async function loadNB(){
  const b=$('nbBox');
  try{
    const j=await fj('/api/live/northbound');
    if(j.error||!j.data){b.innerHTML='<div class="err" style="padding:60px">北向数据获取失败<br><span style="font-size:10px;color:var(--sub)">同花顺 hsgtApi 可能被网络限制</span></div>';return}
    const d=j.data,pts=d.realtime||[],hist=d.history||[];
    $('nbTag').textContent=pts.length+'个分钟点 | 历史'+hist.length+'日';

    // No realtime data
    if(!pts.length){
      let h='<div class="err" style="padding:60px">当前无实时北向数据<br><span style="font-size:10px;color:var(--sub)">(同花顺 hsgtApi 仅交易时段 09:10-15:00 有分钟数据)</span>';
      if(hist.length){h+='<br><br><div style="font-size:12px;text-align:left;padding:0 20px"><b>近10日历史累计净买入(亿):</b><br>'+hist.slice(-10).map(x=>x.date+' 沪 '+x.hgt.toFixed(1)+' / 深 '+x.sgt.toFixed(1)+' | 合计 '+sg(x.hgt+x.sgt)+(x.hgt+x.sgt).toFixed(2)).join('<br>')+'</div>';}
      h+='</div>';b.innerHTML=h;return;
    }

    // Build summary + chart
    const hgt=pts.map(p=>p.hgt||0),sgt=pts.map(p=>p.sgt||0);
    const last=pts[pts.length-1],lH=hgt[hgt.length-1],lS=sgt[sgt.length-1];
    let html='<div class="nb-summary"><span>沪股通 <b class="'+up(lH)+'">'+sg(lH)+lH.toFixed(2)+'亿</b></span><span>深股通 <b class="'+up(lS)+'">'+sg(lS)+lS.toFixed(2)+'亿</b></span><span>合计 <b class="'+up(lH+lS)+'">'+sg(lH+lS)+(lH+lS).toFixed(2)+'亿</b></span><span style="color:var(--sub);font-size:10px">'+last.time+'</span></div>';

    // ECharts or text fallback
    if(typeof echarts==='undefined'){
      html+='<div class="pad" style="font-size:11px;max-height:440px;overflow-y:auto;line-height:1.8">';
      for(let i=Math.max(0,pts.length-40);i<pts.length;i++)html+=pts[i].time+' H:'+hgt[i].toFixed(1)+' S:'+sgt[i].toFixed(1)+'<br>';
      html+='</div>';b.innerHTML=html;return;
    }

    html+='<div class="nb-chart-wrap" id="nbChart"></div>';
    b.innerHTML=html;

    // Init chart
    setTimeout(()=>{
      const cd=$('nbChart');if(!cd)return;
      if(nbC)nbC.dispose();
      nbC=echarts.init(cd);
      nbC.setOption({
        backgroundColor:'transparent',
        tooltip:{trigger:'axis'},
        legend:{top:0,textStyle:{fontSize:10,color:'#8a94a6'},data:['沪股通','深股通']},
        grid:{left:'8%',right:'3%',top:'10%',bottom:'5%'},
        xAxis:{type:'category',data:pts.map(p=>p.time),axisLabel:{fontSize:8,color:'#8a94a6',interval:29}},
        yAxis:{type:'value',axisLabel:{fontSize:9,color:'#8a94a6',formatter:'{value}亿'},splitLine:{lineStyle:{color:'#2a3240'}}},
        series:[
          {name:'沪股通',type:'line',data:hgt,symbol:'none',lineStyle:{width:1.5,color:'#ff5d5d'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(255,93,93,0.12)'},{offset:1,color:'rgba(255,93,93,0)'}]}}},
          {name:'深股通',type:'line',data:sgt,symbol:'none',lineStyle:{width:1.5,color:'#4c8dff'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(76,141,255,0.12)'},{offset:1,color:'rgba(76,141,255,0)'}]}}}
        ],
        dataZoom:[{type:'inside',start:0,end:100}],
      });
    },100);
  }catch(e){b.innerHTML='<div class="err">'+e.message+'</div>'}
}

// ═══════════════════ 龙虎榜 ═══════════════════
async function loadDT(date){
  const b=$('dtBox');
  try{
    const d2=date||$('dtDate').value||'';
    const j=await fj('/api/live/dragon_tiger'+(d2?'?date='+d2:''));
    if(j.error||!j.data){b.innerHTML='<div class="err">非交易日或无数据</div>';return}
    const d=j.data,stocks=(d.stocks||[]).filter(s=>(s.net_buy_wan||0)>3000);
    $('dtTag').textContent=d.date+' | '+d.total_records+'条上榜 | 净买>3000万: '+stocks.length+'只';
    if(!stocks.length){b.innerHTML='<div class="err">净买入>3000万: 0只<br><span style="font-size:10px">共'+d.total_records+'条上榜记录</span></div>';return}
    b.innerHTML=stocks.map(s=>
      '<div class="dt-row"><span class="dt-n">'+s.name+'</span> <span class="dt-c"><a href="/live?code='+s.code+'" style="color:var(--accent);text-decoration:none">'+s.code+'</a> <a href="/fundamentals?code='+s.code+'" style="color:var(--sub);text-decoration:none;font-size:9px">📋</a></span> <span class="'+up(s.change_pct)+'" style="float:right;font-weight:500">'+sg(s.change_pct)+s.change_pct+'%</span><br><span class="dt-reason">'+(s.reason||'')+'</span><span style="float:right">净买<b class="'+up(s.net_buy_wan||0)+'">'+(s.net_buy_wan>0?'+':'')+(s.net_buy_wan||0).toFixed(0)+'万</b> 买'+(s.buy_wan||0).toFixed(0)+'万 卖'+(s.sell_wan||0).toFixed(0)+'万</span></div>'
    ).join('');
  }catch(e){b.innerHTML='<div class="err">-</div>'}
}

// ═══════════════════ 解禁+概念 ═══════════════════
async function loadLC(){
  const b=$('lcBox');
  try{
    const code='000001';
    const[lk,cp]=await Promise.all([fj('/api/live/lockup?code='+code),fj('/api/live/concept?code='+code)]);
    let h='<div style="font-size:11px;font-weight:500;margin-bottom:4px">示例: 平安银行(000001)</div>';

    if(cp.data&&cp.data.concept_tags){
      h+='<div style="font-size:11px;font-weight:500;margin:8px 0 4px">概念板块 ('+cp.data.total+'个)</div><div style="line-height:2">'+cp.data.concept_tags.slice(0,20).map(t=>'<span class="ctag">'+t+'</span>').join(' ')+'</div>';
      if(cp.data.boards&&cp.data.boards.length){
        h+='<div style="font-size:11px;font-weight:500;margin:12px 0 4px">板块明细</div>';
        h+=cp.data.boards.slice(0,15).map(x=>'<div style="font-size:10px;padding:3px 0;border-bottom:1px solid var(--line)">'+x.name+' <span style="color:var(--sub)">'+x.code+' '+(x.change_pct?' '+sg(x.change_pct)+x.change_pct+'%':'')+'</span></div>').join('');
      }
    }

    if(lk.data){
      const up=lk.data.upcoming||[],hist=lk.data.history||[];
      h+='<div style="font-size:11px;font-weight:500;margin:12px 0 4px;color:var(--gold)">未来90天解禁</div>';
      if(up.length){h+=up.map(u=>'<div class="lk-item"><span class="lk-date">'+u.date+'</span> <span class="lk-type">'+(u.type||'')+'</span><br><span class="lk-detail">'+(u.shares||0).toFixed(0)+'万股 | 可流通'+(u.able_shares||0).toFixed(0)+'万股 | 占比'+((u.ratio||0)*100).toFixed(1)+'%</span></div>').join('');}
      else{h+='<div style="font-size:11px;color:var(--green);margin-bottom:8px">未来90天无待解禁</div>';}
      h+='<div style="font-size:10px;color:var(--sub);margin:6px 0">历史'+hist.length+'批解禁'+(hist[0]?' | 最近: '+hist[0].date+' '+hist[0].type:'')+'</div>';
    }
    b.innerHTML=h||'<div class="err">暂无</div>';
  }catch(e){b.innerHTML='<div class="err">-</div>'}
}

// ═══════════════════ 打板 ═══════════════════
async function loadLU(){
  const b=$('luBox');
  try{
    const j=await fj('/api/live/limit-up');
    if(j.error||!j.data){b.innerHTML='<div class="err">非交易日或无数据</div>';return}
    const s=j.data.sentiment||{},zt=j.data.top_stocks||[];
    let h='<div class="sent-grid">';
    h+='<div class="sent-i"><div class="sent-v" style="color:#ff5d5d">'+s.zt_count+'</div><div class="sent-l">涨停</div></div>';
    h+='<div class="sent-i"><div class="sent-v" style="color:#faad14">'+s.zb_count+'</div><div class="sent-l">炸板</div></div>';
    h+='<div class="sent-i"><div class="sent-v" style="color:#26c281">'+s.dt_count+'</div><div class="sent-l">跌停</div></div>';
    h+='<div class="sent-i"><div class="sent-v">'+(s.break_rate||0)+'%</div><div class="sent-l">炸板率</div></div></div>';
    if(s.max_height)h+='<span style="font-size:12px">最高 <b style="color:var(--red)">'+s.max_height+'</b> 连板 | 梯队: '+JSON.stringify(s.ladder||{}).replace(/"/g,'').slice(1,-1).replace(/,/g,', ')+'</span>';
    if(zt.length)h+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;font-size:10px">'+zt.slice(0,30).map(x=>'<span style="background:var(--panel2);padding:3px 8px;border-radius:4px"><a href="/live?code='+x.code+'" style="color:var(--text);text-decoration:none">'+x.name+'</a> <span style="color:var(--sub)">'+(x.zt_stat||'')+'</span></span>').join('')+'</div>';
    b.innerHTML=h;
  }catch(e){b.innerHTML='<div class="err">-</div>'}
}

// ═══════════════════ 刷新 ═══════════════════
let loading=false;
async function refreshAll(){
  if(loading)return;loading=true;
  $('tick').textContent='刷新中...';
  if(!$('dtDate').value){$('dtDate').value=new Date().toISOString().slice(0,10);}
  await Promise.allSettled([loadHS(),loadNB(),loadDT(),loadLC(),loadLU()]);
  $('tick').textContent='已更新 '+new Date().toLocaleTimeString();
  loading=false;
}

$('dtDate').addEventListener('keydown',e=>{if(e.key==='Enter')loadDT()});
refreshAll();
</script>
</body>
</html>
