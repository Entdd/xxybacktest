{% extends "base.html" %}
{% block title %}研报层 · 研报分析{% endblock %}
{% block body_class %}dark{% endblock %}

{% block extra_css %}
<style>
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mt12{margin-top:12px}
  .card{background:#171c26;border:1px solid #2a3240;border-radius:8px;overflow:hidden}
  .ch{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #2a3240}
  .ch h3{font-size:12px;font-weight:500}.ch .tag{font-size:10px;color:#8a94a6}
  .cb{flex:1}.cb.pad{padding:10px 14px}.cb.scrl{overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a3240 transparent;padding:8px 14px}
  .cb.scrl::-webkit-scrollbar{width:4px}.cb.scrl::-webkit-scrollbar-thumb{background:#2a3240;border-radius:2px}
  .report-row{padding:8px 0;border-bottom:1px solid #2a3240;font-size:11px;line-height:1.5}.report-row:last-child{border-bottom:none}
  .report-title{font-weight:600;color:#e6ebf2}.report-meta{color:#8a94a6;font-size:10px}.report-rating{color:#4c8dff;font-weight:500}
  .eps-table{width:100%;font-size:11px;border-collapse:collapse}.eps-table th{background:#1e2531;padding:6px 10px;text-align:left;font-weight:500;color:#8a94a6}.eps-table td{padding:6px 10px;border-bottom:1px solid #2a3240}
  .iw-input{display:flex;gap:8px;margin-bottom:12px}.iw-input input{flex:1;background:#1e2531;border:1px solid #2a3240;color:#e6ebf2;border-radius:6px;padding:8px 12px;font-size:13px}
  .art-row{padding:6px 0;border-bottom:1px solid #2a3240;font-size:11px}.art-row a{color:#4c8dff;text-decoration:none}.art-row a:hover{text-decoration:underline}
  @media(max-width:1000px){.grid2{grid-template-columns:1fr}}
</style>
{% endblock %}

{% block content %}
<div class="toolbar" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
  <h2 style="font-size:18px;font-weight:600">📋 研报层 · 研报分析 <span style="color:#4c8dff">●</span></h2>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="tick" id="tick">加载中...</span>
    <button class="btn" onclick="refreshAll()">刷新</button>
    <input class="stock-code" id="stockCode" value="000001" placeholder="代码">
  </div>
</div>

<div class="grid2">
  <div class="card"><div class="ch"><h3>东财研报列表</h3><span class="tag" id="rpTag"></span></div><div class="cb scrl" id="rpBox" style="max-height:500px"><div class="loading">加载中</div></div></div>
  <div class="card"><div class="ch"><h3>同花顺一致预期EPS</h3><span class="tag" id="epsTag"></span></div><div class="cb scrl pad" id="epsBox" style="max-height:500px"><div class="loading">加载中</div></div></div>
</div>
<div class="card mt12"><div class="ch"><h3>问财语义搜索</h3><span class="tag" id="iwTag"></span></div><div class="cb pad">
  <div class="iw-input"><input id="iwQuery" placeholder="输入关键词，如：光伏板块2026年增速预测"><button class="btn" onclick="doIwencai()">搜索</button></div>
  <div class="scrl" id="iwBox" style="max-height:400px"><div class="loading" style="display:none" id="iwLoad"></div><div style="color:#8a94a6;font-size:12px;text-align:center;padding:20px">输入关键词后点击搜索</div></div>
</div></div>
{% endblock %}

{% block extra_js %}
<script>
(function(){
const $=s=>document.getElementById(s);let curCode=$('stockCode').value;
function fmtCode(c){return c.replace('.SZ','').replace('.SH','').replace('.BJ','')}
(function init(){const p=new URLSearchParams(window.location.search);const c=p.get('code');if(c&&c.match(/^\d{6}/)){curCode=c;$('stockCode').value=c;sessionStorage.setItem('lastCode',c);document.title=c+' - 研报分析'}else{const s=sessionStorage.getItem('lastCode');if(s&&s.match(/^\d{6}/)){curCode=s;$('stockCode').value=s}}refreshAll()})();

async function refreshAll(){$('tick').textContent='加载中...';await Promise.allSettled([loadReports(),loadEPS()]);$('tick').textContent=new Date().toLocaleTimeString()}

async function loadReports(){const b=$('rpBox'),t=$('rpTag');b.innerHTML='<div class="loading">加载中</div>';try{const r=await fetch('/api/research/reports?code='+curCode);const d=await r.json();if(!d.data||!d.data.reports||!d.data.reports.length){b.innerHTML='<div class="err">暂无研报数据</div>';t.textContent='0条';return}const reps=d.data.reports;t.textContent=reps.length+'条';b.innerHTML=reps.slice(0,30).map(r=>'<div class="report-row"><div class="report-title">'+r.title+'</div><div class="report-meta">'+(r.orgName||'')+' · '+(r.publishDate||'')+' · <span class="report-rating">'+(r.rating||'')+'</span></div></div>').join('')}catch(e){b.innerHTML='<div class="err">加载失败: '+e.message+'</div>'}}

async function loadEPS(){const b=$('epsBox'),t=$('epsTag');b.innerHTML='<div class="loading">加载中</div>';try{const r=await fetch('/api/research/eps_forecast?code='+curCode);const d=await r.json();if(!d.data||!d.data.eps_forecast){b.innerHTML='<div class="err">暂无EPS数据</div>';t.textContent='无';return}const eps=d.data.eps_forecast;if(Array.isArray(eps)&&eps.length>0){t.textContent=eps.length+'期';const keys=Object.keys(eps[0]);b.innerHTML='<table class="eps-table"><tr>'+keys.map(k=>'<th>'+k+'</th>').join('')+'</tr>'+eps.map(r=>'<tr>'+keys.map(k=>'<td>'+(r[k]||'-')+'</td>').join('')+'</tr>').join('')+'</table>'}else if(typeof eps==='object'){t.textContent=Object.keys(eps).length+'项';b.innerHTML=Object.entries(eps).map(([k,v])=>'<div style="padding:4px 0;font-size:12px"><span style="color:#8a94a6">'+k+':</span> <b>'+v+'</b></div>').join('')}else{b.innerHTML='<div style="padding:10px;font-size:12px">'+JSON.stringify(eps)+'</div>'}}catch(e){b.innerHTML='<div class="err">加载失败: '+e.message+'</div>'}}

async function doIwencai(){const q=$('iwQuery').value.trim();if(!q)return;const box=$('iwBox'),load=$('iwLoad'),tag=$('iwTag');load.style.display='block';box.innerHTML='';try{const r=await fetch('/api/research/iwencai?q='+encodeURIComponent(q));const d=await r.json();load.style.display='none';if(d.note==='no_api_key'){box.innerHTML='<div class="err">问财需要 API Key<br><span style="font-size:10px;color:#8a94a6">'+d.tip+'</span></div>';return}if(!d.data||!d.data.articles||!d.data.articles.length){box.innerHTML='<div class="err">无搜索结果</div>';tag.textContent='0条';return}tag.textContent=d.data.total+'条';box.innerHTML=d.data.articles.map(a=>'<div class="art-row"><a href="'+(a.url||'#')+'" target="_blank">'+a.title+'</a> <span style="color:#8a94a6;font-size:10px">'+(a.source||'')+' '+(a.time||'')+'</span></div>').join('')}catch(e){load.style.display='none';box.innerHTML='<div class="err">搜索失败: '+e.message+'</div>'}}
})();
</script>
{% endblock %}
