{% extends "base.html" %}

{% block title %}定时任务管理 - 模拟交易系统{% endblock %}

{% block extra_css %}
<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .page-header h2 {
        font-size: 20px;
        font-weight: 500;
        color: #333;
    }

    .task-card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .task-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    .task-table th,
    .task-table td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid #f0f0f0;
    }

    .task-table th {
        color: #999;
        font-weight: 500;
        background: #fafafa;
        font-size: 13px;
    }

    .task-table tr:hover {
        background: #fafafa;
    }

    .task-table td {
        color: #333;
    }

    .task-name {
        font-weight: 500;
    }

    .task-name .builtin-tag {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        background: #e6f7e6;
        color: #52c41a;
    }

    .cron-code {
        font-family: 'SF Mono', Monaco, 'Courier New', monospace;
        font-size: 13px;
        color: #666;
        background: #f5f7fa;
        padding: 4px 10px;
        border-radius: 4px;
    }

    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
    }

    .status-badge.success {
        background: #e6f7e6;
        color: #52c41a;
    }

    .status-badge.failed,
    .status-badge.error {
        background: #fff1f0;
        color: #ff4d4f;
    }

    .status-badge.running {
        background: #e6f4ff;
        color: #1890ff;
    }

    .status-badge.unknown,
    .status-badge.- {
        background: #f5f5f5;
        color: #999;
    }

    .action-btns {
        display: flex;
        gap: 8px;
    }

    .btn-sm {
        padding: 5px 12px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-trigger {
        background: #667eea;
        color: white;
    }

    .btn-trigger:hover {
        background: #5a6fd6;
    }

    .btn-trigger:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-log {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #e8e8e8;
    }

    .btn-log:hover {
        border-color: #667eea;
        color: #667eea;
    }

    .btn-delete {
        background: #fff1f0;
        color: #ff4d4f;
        border: 1px solid #ffccc7;
    }

    .btn-delete:hover {
        background: #ff4d4f;
        color: white;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
    }

    .empty-state h3 {
        font-size: 16px;
        margin-bottom: 8px;
        color: #666;
    }

    /* 刷新指示器 */
    .refresh-indicator {
        font-size: 12px;
        color: #999;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .refresh-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #52c41a;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    .next-run-time {
        color: #666;
        font-size: 13px;
    }

    .next-run-time .past {
        color: #ff4d4f;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>定时任务管理</h2>
    </div>
    <div class="refresh-indicator">
        <span class="refresh-dot"></span>
        <span>每 3 秒自动刷新</span>
    </div>
</div>

<div class="task-card">
    <table class="task-table">
        <thead>
            <tr>
                <th style="width: 20%;">任务名称</th>
                <th style="width: 18%;">触发时间 (cron)</th>
                <th style="width: 18%;">下次执行</th>
                <th style="width: 12%;">上次状态</th>
                <th style="width: 32%;">操作</th>
            </tr>
        </thead>
        <tbody id="taskTableBody">
            <tr>
                <td colspan="5" class="empty-state">加载中...</td>
            </tr>
        </tbody>
    </table>
</div>

{% endblock %}

{% block extra_js %}
<script>
    let listInterval = null;

    // 状态映射
    const STATUS_MAP = {
        'success': { text: '成功', class: 'success' },
        'failed':  { text: '失败', class: 'failed' },
        'error':   { text: '错误', class: 'error' },
        'running': { text: '执行中', class: 'running' },
        '-':       { text: '未执行', class: '-' },
    };

    async function fetchTaskList() {
        try {
            const resp = await fetch('/tasks/api/list');
            const tasks = await resp.json();
            renderTaskList(tasks);
        } catch (e) {
            console.error('获取任务列表失败:', e);
        }
    }

    function renderTaskList(tasks) {
        const tbody = document.getElementById('taskTableBody');
        if (!tasks || tasks.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="empty-state">
                        <h3>暂无定时任务</h3>
                        <p>使用 schedule_task() 注册您的第一个任务</p>
                    </td>
                </tr>
            `;
            updatePolling([]);
            return;
        }

        tbody.innerHTML = tasks.map(task => {
            const st = STATUS_MAP[task.last_status] || { text: task.last_status || '未执行', class: '-' };
            const builtinTag = task.is_builtin ? '<span class="builtin-tag">内置</span>' : '';
            const nextRun = task.next_run_time
                ? formatTime(task.next_run_time)
                : '<span style="color:#999">-</span>';

            const isLive = task.task_id.startsWith('live_');
            const accountId = isLive ? task.task_id.replace(/^live_/, '') : '';

            let actions = `
                <button class="btn-sm btn-trigger" onclick="triggerTask('${task.task_id}', this)">触发</button>
                <a href="/tasks/log/${task.task_id}" class="btn-sm btn-log">日志</a>
            `;
            if (isLive) {
                actions += `<a href="/account/${accountId}" class="btn-sm btn-log">账户</a>`;
            }
            if (!task.is_builtin) {
                actions += `<button class="btn-sm btn-delete" onclick="deleteTask('${task.task_id}')">删除</button>`;
            }

            return `
                <tr>
                    <td>
                        <span class="task-name">${task.name}${builtinTag}</span>
                    </td>
                    <td><code class="cron-code">${task.cron}</code></td>
                    <td class="next-run-time">${nextRun}</td>
                    <td><span class="status-badge ${st.class}">${st.text}</span></td>
                    <td><div class="action-btns">${actions}</div></td>
                </tr>
            `;
        }).join('');

        updatePolling(tasks);
    }

    // 智能轮询：有执行中的任务才刷新
    function updatePolling(tasks) {
        const hasRunning = tasks.some(t => t.last_status === 'running');
        if (hasRunning) {
            startPolling();
        } else {
            stopPolling();
        }
    }

    function startPolling() {
        if (listInterval) return;
        listInterval = setInterval(fetchTaskList, 3000);
        setRefreshIndicator(true);
    }

    function stopPolling() {
        if (listInterval) {
            clearInterval(listInterval);
            listInterval = null;
        }
        setRefreshIndicator(false);
    }

    function setRefreshIndicator(isPolling) {
        const dot = document.querySelector('.refresh-dot');
        const text = document.querySelector('.refresh-indicator span:last-child');
        if (isPolling) {
            dot.style.animation = 'pulse 2s infinite';
            dot.style.background = '#52c41a';
            text.textContent = '实时刷新中';
        } else {
            dot.style.animation = 'none';
            dot.style.background = '#999';
            text.textContent = '任务均已完成';
        }
    }

    function formatTime(dtStr) {
        // 后端返回 "2026-05-15 22:00:00" 格式
        if (!dtStr) return '-';
        const dt = new Date(dtStr.replace(' ', 'T'));
        const now = new Date();
        const isToday = dt.toDateString() === now.toDateString();
        const timePart = dtStr.slice(11, 16);
        if (isToday) {
            return `今天 ${timePart}`;
        }
        return `${dtStr.slice(0, 10)} ${timePart}`;
    }

    async function triggerTask(taskId, btn) {
        const originalText = btn.textContent;
        const originalBg = btn.style.background;
        btn.disabled = true;
        btn.textContent = '触发中...';
        try {
            const resp = await fetch(`/tasks/api/trigger/${taskId}`, { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                btn.textContent = '已触发';
                btn.style.background = '#52c41a';
                fetchTaskList();
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = originalBg;
                    btn.disabled = false;
                }, 1500);
                return;
            } else {
                btn.textContent = data.error || '失败';
                btn.style.background = '#ff4d4f';
                console.error('触发失败:', data.error);
            }
        } catch (e) {
            btn.textContent = '失败';
            btn.style.background = '#ff4d4f';
            console.error('请求失败:', e.message);
        }
        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = originalBg;
            btn.disabled = false;
        }, 2000);
    }

    async function deleteTask(taskId) {
        if (!confirm('确定要删除该任务吗？此操作不可恢复！')) return;
        try {
            const resp = await fetch(`/tasks/api/delete/${taskId}`, { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                fetchTaskList();
            } else {
                console.error('删除失败:', data.error);
            }
        } catch (e) {
            console.error('请求失败:', e.message);
        }
    }

    // 初始化：只获取一次列表，由 renderTaskList 内部根据 running 状态自动控制轮询
    fetchTaskList();

    // 页面卸载时清理定时器
    window.addEventListener('beforeunload', () => {
        if (listInterval) clearInterval(listInterval);
    });
</script>
{% endblock %}
