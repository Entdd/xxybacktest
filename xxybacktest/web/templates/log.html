{% extends "base.html" %}

{% block title %}任务日志 - 模拟交易系统{% endblock %}

{% block extra_css %}
<style>
    .time-item {
        padding: 14px 20px;
        cursor: pointer;
        border-bottom: 1px solid #e8e8e8;
        font-size: 14px;
        color: #666;
        transition: all 0.15s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
    }
    .time-item .time-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .time-item .mini-status {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 3px;
        flex-shrink: 0;
    }
    .mini-status.success { background: #d9f7be; color: #52c41a; }
    .mini-status.failed  { background: #ffccc7; color: #ff4d4f; }
    .mini-status.error   { background: #ffccc7; color: #ff4d4f; }
    .mini-status.running { background: #bae7ff; color: #1890ff; }
    .mini-status.unknown { background: #f0f0f0; color: #999; }
    .time-item.active .mini-status.success { background: rgba(255,255,255,0.25); color: #fff; }
    .time-item.active .mini-status.failed,
    .time-item.active .mini-status.error   { background: rgba(255,255,255,0.25); color: #fff; }
    .time-item.active .mini-status.running { background: rgba(255,255,255,0.25); color: #fff; }
    .time-item.active .mini-status.unknown { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
    .time-item:hover {
        background: #f0f0f0;
        color: #333;
    }
    .time-item.active {
        background: #667eea;
        color: white;
        border-left: 4px solid #4c63c9;
        padding-left: 16px;
    }
    .time-item.active:hover {
        background: #5a6fd6;
    }
    .sidebar-empty {
        padding: 40px 20px;
        text-align: center;
        color: #999;
        font-size: 14px;
    }
    .header {
        padding: 14px 24px;
        background: #2d2d2d;
        border-bottom: 1px solid #3e3e3e;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }
    .header .time-display {
        font-size: 14px;
        color: #d4d4d4;
    }
    .status-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
    }
    .btn-back {
        padding: 5px 14px;
        border-radius: 4px;
        font-size: 13px;
        background: #3e3e3e;
        color: #ccc;
        border: 1px solid #555;
        text-decoration: none;
        cursor: pointer;
    }
    .btn-back:hover {
        background: #4e4e4e;
        color: white;
    }
    .btn-source-toggle {
        padding: 5px 14px;
        border-radius: 4px;
        font-size: 13px;
        background: #4e4e4e;
        color: #ccc;
        border: 1px solid #555;
        text-decoration: none;
        cursor: pointer;
    }
    .btn-source-toggle:hover {
        background: #667eea;
        color: white;
        border-color: #667eea;
    }
    .btn-source-toggle.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
    }
    .source-panel {
        display: none;
        background: #1e1e1e;
        border-bottom: 1px solid #3e3e3e;
        max-height: 55vh;
        overflow-y: auto;
        flex-shrink: 0;
    }
    .source-panel.visible {
        display: block;
    }
    .source-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 24px;
        border-bottom: 1px solid #3e3e3e;
        font-size: 13px;
        color: #999;
    }
    .source-toolbar .source-meta {
        display: flex;
        gap: 12px;
    }
    .source-toolbar .source-meta span {
        background: #2d2d2d;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
    }
    .copy-source-btn {
        padding: 4px 12px;
        border: 1px solid #555;
        background: #3e3e3e;
        color: #ccc;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .copy-source-btn:hover {
        border-color: #667eea;
        color: #667eea;
    }
    .source-code-block {
        padding: 16px 24px;
        font-family: 'SF Mono', Monaco, 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.7;
        color: #d4d4d4;
        white-space: pre;
        overflow-x: auto;
    }
    .source-section-title {
        font-size: 12px;
        color: #999;
        padding: 8px 24px 0 24px;
        border-top: 1px solid #3e3e3e;
    }
    .source-empty {
        padding: 40px 24px;
        text-align: center;
        color: #666;
        font-style: italic;
    }
    .log-pre {
        font-family: 'SF Mono', Monaco, 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.7;
        color: #d4d4d4;
        white-space: pre-wrap;
        word-break: break-all;
        margin: 0;
        padding: 20px 24px;
    }
    .empty-msg {
        color: #666;
        font-style: italic;
    }
</style>
{% endblock %}

{% block content %}
<!-- 必须是这种结构，不要改 -->
<div style="display: flex; height: 100vh;">
  <!-- 左栏：时间列表 -->
  <div style="width: 280px; flex-shrink: 0; overflow-y: auto; background: #fafafa; border-right: 1px solid #e8e8e8;">
    <div id="sidebarList">
      <div class="sidebar-empty">加载中...</div>
    </div>
  </div>

  <!-- 右栏：详情 -->
  <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
    <div class="header">
      <span class="time-display" id="currentTime">--</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="status-badge" id="currentStatus">--</span>
        <button class="btn-source-toggle" id="sourceToggleBtn" onclick="toggleSource()">查看源码</button>
        <a href="/tasks" class="btn-back">返回</a>
      </div>
    </div>
    <!-- 源码面板 -->
    <div class="source-panel" id="sourcePanel"></div>
    <div style="flex: 1; overflow-y: auto; background: #1e1e1e;" id="logBody">
      <pre class="log-pre"><span class="empty-msg">请选择左侧执行时间</span></pre>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const TASK_ID = "{{ task_id }}";
    let historyData = [];
    let currentLog = null;

    function parseLogStatus(content) {
        if (!content) return 'unknown';

        // 从末尾往前找最后一个明确的状态标记
        const lines = content.split('\n');
        for (let i = lines.length - 1; i >= 0; i--) {
            const line = lines[i].trim();
            if (line.includes('结果: 成功')) return 'success';
            if (line.includes('结果: 失败')) return 'failed';
            if (line.includes('异常:')) return 'error';
        }

        // 兜底：检测到 Traceback / Error 关键字
        if (content.includes('Traceback (most recent call last):') ||
            content.includes('Error:') ||
            content.includes('[ERROR]')) {
            return 'error';
        }

        if (content.includes('===== 任务开始')) return 'running';
        return 'unknown';
    }

    async function loadData() {
        const [logResp, histResp] = await Promise.all([
            fetch(`/tasks/api/log/${TASK_ID}`),
            fetch(`/tasks/api/history/${TASK_ID}`),
        ]);

        currentLog = await logResp.json();
        const histData = await histResp.json();
        historyData = histData.success ? histData.history : [];

        if (currentLog.content && currentLog.content.trim() !== '') {
            const latestExists = historyData.some(h => h.executed_at === currentLog.executed_at);
            if (!latestExists && currentLog.executed_at !== '-') {
                historyData.unshift({
                    executed_at: currentLog.executed_at,
                    content: currentLog.content,
                    status: currentLog.status,
                });
            }
        }

        renderSidebar();
        if (historyData.length > 0) {
            selectEntry(0);
        }
    }

    function renderSidebar() {
        const container = document.getElementById('sidebarList');
        if (historyData.length === 0) {
            container.innerHTML = '<div class="sidebar-empty">暂无执行记录</div>';
            return;
        }
        container.innerHTML = historyData.map((item, idx) => {
            const isActive = idx === 0 ? 'active' : '';
            const st = item.status || parseLogStatus(item.content);
            const stMap = {
                success: '成功',
                failed:  '失败',
                error:   '错误',
                running: '执行中',
                unknown: '--',
            };
            return `<div class="time-item ${isActive}" onclick="selectEntry(${idx})" data-idx="${idx}">
                        <span class="time-text">${item.executed_at}</span>
                        <span class="mini-status ${st}">${stMap[st] || '--'}</span>
                    </div>`;
        }).join('');
    }

    function selectEntry(idx) {
        document.querySelectorAll('.time-item').forEach(el => el.classList.remove('active'));
        const target = document.querySelector(`.time-item[data-idx="${idx}"]`);
        if (target) target.classList.add('active');

        const item = historyData[idx];
        if (!item) return;

        document.getElementById('currentTime').textContent = item.executed_at;

        const status = item.status || parseLogStatus(item.content);
        const STATUS_MAP = {
            'success': { text: '成功', bg: '#52c41a', color: 'white' },
            'failed':  { text: '失败', bg: '#ff4d4f', color: 'white' },
            'error':   { text: '错误', bg: '#ff4d4f', color: 'white' },
            'running': { text: '执行中', bg: '#1890ff', color: 'white' },
            'unknown': { text: '未知', bg: '#666', color: 'white' },
        };
        const st = STATUS_MAP[status] || STATUS_MAP['unknown'];
        const badge = document.getElementById('currentStatus');
        badge.textContent = st.text;
        badge.style.background = st.bg;
        badge.style.color = st.color;

        const body = document.getElementById('logBody');
        if (!item.content || item.content.trim() === '') {
            body.innerHTML = '<pre class="log-pre"><span class="empty-msg">暂无日志内容</span></pre>';
        } else {
            body.innerHTML = `<pre class="log-pre">${escapeHtml(item.content)}</pre>`;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ---------- 源码查看 ----------
    let sourceData = null;

    async function loadSource() {
        if (sourceData) return;
        try {
            const resp = await fetch(`/tasks/api/source/${TASK_ID}`);
            if (!resp.ok) return;
            sourceData = await resp.json();
        } catch (e) {
            console.error('加载源码失败:', e);
        }
    }

    function toggleSource() {
        const panel = document.getElementById('sourcePanel');
        const btn = document.getElementById('sourceToggleBtn');
        panel.classList.toggle('visible');
        btn.classList.toggle('active');
        if (panel.classList.contains('visible')) {
            btn.textContent = '收起源码';
            if (!sourceData) loadSource().then(renderSource);
        } else {
            btn.textContent = '查看源码';
        }
    }

    function renderSource() {
        const panel = document.getElementById('sourcePanel');
        if (!sourceData) {
            panel.innerHTML = '<div class="source-empty">无法加载源码</div>';
            return;
        }

        let html = '';
        // 工具栏：元信息 + 复制按钮
        const typeLabel = sourceData.type === 'live' ? '实盘策略' : sourceData.type === 'builtin' ? '内置函数' : '脚本文件';
        const metaItems = [];
        if (sourceData.file) metaItems.push(`文件: ${sourceData.file}`);
        if (sourceData.cron) metaItems.push(`cron: ${sourceData.cron}`);
        if (sourceData.trigger_cron) metaItems.push(`cron: ${sourceData.trigger_cron}`);
        if (sourceData.execution_mode) metaItems.push(`模式: ${sourceData.execution_mode}`);
        if (sourceData.rebalance_interval) metaItems.push(`调仓周期: ${sourceData.rebalance_interval}天`);
        if (sourceData.created_at) metaItems.push(`创建: ${sourceData.created_at}`);

        const metaHtml = metaItems.length ? '<div class="source-meta">' + metaItems.map(m => `<span>${escapeHtml(m)}</span>`).join('') + '</div>' : '';
        html += `
            <div class="source-toolbar">
                ${metaHtml}
                <span style="color:#888;">${typeLabel}</span>
            </div>
        `;

        // 实盘策略：分两个代码块
        if (sourceData.type === 'live') {
            if (sourceData.initialize_code) {
                html += `<div class="source-section-title">initialize 函数</div>`;
                html += `<pre class="source-code-block">${escapeHtml(sourceData.initialize_code)}</pre>`;
            }
            if (sourceData.handle_data_code) {
                html += `<div class="source-section-title">handle_data 函数</div>`;
                html += `<pre class="source-code-block">${escapeHtml(sourceData.handle_data_code)}</pre>`;
            }
            if (!sourceData.initialize_code && !sourceData.handle_data_code) {
                html += `<div class="source-empty">暂无源码记录</div>`;
            }
        } else {
            // 内置 / 脚本
            if (sourceData.code) {
                html += `<pre class="source-code-block">${escapeHtml(sourceData.code)}</pre>`;
            } else {
                html += `<div class="source-empty">暂无源码</div>`;
            }
        }

        panel.innerHTML = html;
    }

    loadData();

    setInterval(async () => {
        const active = document.querySelector('.time-item.active');
        const idx = active ? parseInt(active.dataset.idx) : -1;
        if (idx !== 0) return;

        try {
            const resp = await fetch(`/tasks/api/log/${TASK_ID}`);
            const data = await resp.json();
            if (data.content !== currentLog.content) {
                currentLog = data;
                if (historyData.length > 0) {
                    historyData[0].content = data.content;
                    historyData[0].status = data.status;
                    historyData[0].executed_at = data.executed_at;
                }
                selectEntry(0);
            }
        } catch (e) {
            // 静默忽略
        }
    }, 5000);
</script>
{% endblock %}
